name: Post to X

on:
  schedule:
    - cron: '0,15,30,45 * * * *'  # Every 15 min, at :00 (staggered from IG/Sofia)
  workflow_dispatch: {}       # Manual trigger from GitHub UI

concurrency:
  group: post-to-x
  cancel-in-progress: false  # Queue, don't cancel — let each run finish cleanly

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install tweepy

      - name: Run poster
        id: poster
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python x_post.py

      - name: Commit updated schedule
        if: steps.poster.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up posted entries"
          for attempt in 1 2 3; do
            git push && break
            echo "Push failed (attempt $attempt), rebasing and retrying..."
            git pull --rebase origin main
          done
