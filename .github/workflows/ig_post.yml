name: Post to Instagram

on:
  schedule:
    - cron: '5,20,35,50 * * * *'  # Every 15 min, at :05 (staggered from Elena/Sofia X)
  workflow_dispatch: {}       # Manual trigger from GitHub UI

concurrency:
  group: post-to-instagram
  cancel-in-progress: false  # Queue, don't cancel — let each run finish cleanly

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Run poster
        id: poster
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_IG_CHANNEL_ID: ${{ secrets.BUFFER_IG_CHANNEL_ID }}
        run: python ig_post.py

      - name: Commit updated schedule
        if: steps.poster.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up posted IG entries"
          for attempt in 1 2 3; do
            git push && break
            echo "Push failed (attempt $attempt), rebasing and retrying..."
            git pull --rebase origin main
          done
